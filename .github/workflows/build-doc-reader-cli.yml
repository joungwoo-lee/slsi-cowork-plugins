name: Build & Release DocReaderCli

on:
  push:
    tags:
      - 'v*'
    paths:
      - 'win-office-com-automation/DocReaderCli/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore
        working-directory: win-office-com-automation/DocReaderCli

      - name: Publish single-file binary
        run: |
          dotnet publish -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o ./publish
        working-directory: win-office-com-automation/DocReaderCli

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DocReaderCli-win-x64
          path: win-office-com-automation/DocReaderCli/publish/DocReaderCli.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: DocReaderCli-win-x64
          path: ./artifact

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifact/DocReaderCli.exe
          generate_release_notes: true
          body: |
            ## DocReaderCli - Windows Office COM Automation Reader

            DRM이 적용된 MS Office 문서(.docx, .xlsx, .pptx)를 COM Automation으로 읽는 단일 실행 바이너리입니다.

            ### 사용법
            ```
            DocReaderCli.exe --file "C:\path\to\document.docx"
            ```

            ### 요구사항
            - Windows 10/11
            - Microsoft Office 설치 필수
            - .NET 런타임 불필요 (Self-Contained)
